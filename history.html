<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Booking History — Book My Box</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="profile.css">

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
</head>
<body class="dark-theme">

  <nav class="navbar" style="position: sticky; top: 0; z-index: 100; background: rgba(11,18,16,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--card-line); padding: 14px 0;">
    <div class="wrap nav-flex" style="justify-content: flex-start; gap: 16px;">
      <a href="profile.html" class="btn btn-outline" style="border-radius:50%; padding:10px 10px; display: flex; align-items: center; justify-content: center; height: 38px; width: 38px;" title="Go Back">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </a>
      <a href="index.html" class="logo"><span class="dot"></span>BOOK MY BOX</a>
    </div>
  </nav>

  <section class="profile-dashboard-section" style="padding: 40px 0;">
    <div class="wrap" style="max-width: 680px; margin: 0 auto;">
      
      <div class="dash-card">
        <div class="card-header" style="justify-content: space-between; align-items: center;">
          <h2 style="font-family: 'Anton', sans-serif; font-size: 28px; text-transform: uppercase; letter-spacing: 0.5px; margin: 0;">Full Booking History</h2>
          <span style="font-size: 13.5px; color: var(--text-dim);" id="bookingCount">0 bookings</span>
        </div>
        <div class="card-body p-0">
          <div class="booking-list" id="fullBookingHistoryList">
            <div style="text-align: center; padding: 40px; color: var(--text-dim);">Loading your booking history...</div>
          </div>
        </div>
      </div>
      
    </div>
  </section>

  <script src="firebase-config.js"></script>
  <script>
    // Initialize Firebase
    if (typeof firebase !== 'undefined') {
      const db = firebase.firestore();
      const auth = firebase.auth();
      
      const fullBookingHistoryList = document.getElementById('fullBookingHistoryList');
      const bookingCount = document.getElementById('bookingCount');
      
      auth.onAuthStateChanged(user => {
        if (!user) {
          window.location.href = 'signin.html';
          return;
        }
        
        db.collection('bookings')
          .where('user_id', '==', user.uid)
          .get()
          .then(snap => {
            if (snap.empty) {
              fullBookingHistoryList.innerHTML = `
                <div class="empty-state" style="padding: 40px; text-align: center;">
                  <div class="empty-icon" style="font-size: 40px; margin-bottom: 12px;">📅</div>
                  <div class="empty-text" style="color: var(--text-dim);">No bookings found. Start booking box cricket slots on the homepage!</div>
                </div>`;
              bookingCount.textContent = '0 bookings';
              return;
            }
            
            bookingCount.textContent = `${snap.size} booking${snap.size === 1 ? '' : 's'}`;
            
            const bookings = snap.docs.map(d => {
              const data = d.data();
              const date = data.slot_start ? data.slot_start.toDate() : new Date();
              return {
                name: data.venue_name || 'Box Venue',
                meta: date.toLocaleString('en-IN', { weekday:'short', day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }),
                status: data.status || 'Completed',
                cls: 'status-' + (data.status || 'completed').toLowerCase(),
                dateObj: date
              };
            });
            
            // Sort chronologically descending
            bookings.sort((a, b) => b.dateObj - a.dateObj);
            
            fullBookingHistoryList.innerHTML = bookings.map(b => `
              <div class="list-item" style="padding: 16px; border-bottom: 1px solid var(--card-line); display: flex; justify-content: space-between; align-items: center;">
                <div>
                  <div class="item-title" style="font-weight: 700; color: #fff; font-size: 15px; margin-bottom: 4px;">${b.name}</div>
                  <div class="item-meta" style="font-size: 13px; color: var(--text-dim);">${b.meta}</div>
                </div>
                <div class="item-status ${b.cls}" style="padding: 6px 12px; border-radius: 100px; font-size: 11px; font-weight: 800; text-transform: uppercase;">${b.status}</div>
              </div>
            `).join('');
          })
          .catch(err => {
            console.error("Error fetching bookings:", err);
            fullBookingHistoryList.innerHTML = `<div style="padding: 40px; text-align: center; color: var(--red);">Error loading booking history.</div>`;
          });
      });
    } else {
      console.error("Firebase not loaded.");
    }
  </script>
</body>
</html>
